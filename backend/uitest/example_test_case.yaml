# 示例UI自动化测试用例YAML文件
name: "示例Web UI测试"
description: "这是一个示例Web UI自动化测试用例"
steps:
  - action: "open"
    value: "https://www.example.com"
    description: "打开目标网站"
  
  - action: "wait_for_element"
    locator: "body"
    timeout: 10
    description: "等待页面加载完成"
  
  - action: "assert_title_contains"
    value: "Example"
    description: "验证页面标题包含预期内容"
  
  - action: "screenshot"
    value: "homepage"
    description: "截取首页截图"
  
  - action: "fill"
    locator: "#search-input"
    value: "测试搜索"
    description: "在搜索框中输入内容"
  
  - action: "click"
    locator: "#search-button"
    description: "点击搜索按钮"
  
  - action: "wait"
    value: 2
    description: "等待搜索结果加载"
  
  - action: "screenshot"
    value: "search_results"
    description: "截取搜索结果截图"